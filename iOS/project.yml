name: HomeInsuranceLog
options:
  bundleIdPrefix: com.shimondeitel.insurelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  HomeInsuranceLog:
    type: application
    platform: iOS
    sources:
      - path: HomeInsuranceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: HomeInsuranceLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HomeInsuranceLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeInsuranceLogTests
      - path: HomeInsuranceLog.storekit
    dependencies:
      - target: HomeInsuranceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HomeInsuranceLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomeInsuranceLogUITests
    dependencies:
      - target: HomeInsuranceLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  HomeInsuranceLog:
    build:
      targets:
        HomeInsuranceLog: all
        HomeInsuranceLogTests: [test]
        HomeInsuranceLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: HomeInsuranceLog.storekit
    test:
      config: Debug
      storeKitConfiguration: HomeInsuranceLog.storekit
      targets:
        - HomeInsuranceLogTests
        - HomeInsuranceLogUITests
    archive:
      config: Release
